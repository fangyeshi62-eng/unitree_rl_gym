# 
policy_path: "{LEGGED_GYM_ROOT_DIR}/deploy/pre_train/g2/policy_new.pt"
xml_path: "{LEGGED_GYM_ROOT_DIR}/resources/robots/go2/scene_with_go2.xml"

# Total simulation time
simulation_duration: 60.0
# Simulation time step
simulation_dt: 0.002
# Controller update frequency (meets the requirement of simulation_dt * controll_decimation=0.02; 50Hz)
control_decimation: 10

kps: [20, 20, 20, 20, 20, 20,20, 20, 20, 20, 20, 20]
kds: [0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5, 0.5]

default_angles: [0.1,  0.8,  -1.5,  -0.1, 0.8, -1.5, 
                  0.1,  1,  -1.5,  -0.1, 1, -1.5]

lin_vel_scale: 1.0  # 确保代码中使用了这个值
ang_vel_scale: 1
dof_pos_scale: 1.0
dof_vel_scale: 1
action_scale: 0.25
cmd_scale: [2.0, 2.0, 0.25]
num_actions: 12
num_obs: 48

mapping_joints: [0, 3, 6, 9,   1, 4, 7, 10,   2, 5, 8, 11] # mapping joint actions to a specified order

# TODO: customizable command controller
# isaaclab default set heading_command True
# our pretrained model use heading_command True so you may retrain policy if you want to use heading_command False
# heading_command: False # using cmd_init[2] directly controll yaw speed
# heading_command: True  # use the heading_target controll target yaw (cmd_init[2] is ignored)
heading_command: True
heading_target: 0.5 # yaw target in [-pi, pi] (facing to)
heading_stiffness: 0.5

cmd_init: [1.0, 0, 0] # move forward [-1,1]